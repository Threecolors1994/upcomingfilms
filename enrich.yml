name: Enrich Letterboxd list

on:
  # Manuel : bouton « Run workflow » dans l'onglet Actions
  workflow_dispatch:

  # Auto : à chaque modification du CSV
  push:
    paths:
      - '*.csv'
      - 'enrich.py'

  # Auto : tous les lundis à 7h UTC (8h Paris)
  # Les dates de sortie évoluent, on relance régulièrement
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run enrich.py for each CSV
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          mkdir -p data
          # Pour chaque CSV à la racine, génère data/<nom>.json
          for csv in *.csv; do
            [ -e "$csv" ] || continue
            base=$(basename "$csv" .csv)
            echo "→ $csv"
            python enrich.py "$csv" -o "data/${base}.json"
          done

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Aucun changement"
          else
            git commit -m "🎬 Mise à jour des sorties ($(date -u +%Y-%m-%d))"
            git push
          fi
