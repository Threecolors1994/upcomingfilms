name: Enrich Letterboxd list

on:
  workflow_dispatch:

  push:
    paths:
      - '*.csv'
      - 'enrich.py'
      - 'notify_changes.py'

  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write
  issues: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run enrich.py for each CSV
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          mkdir -p data
          for csv in *.csv; do
            [ -e "$csv" ] || continue
            base=$(basename "$csv" .csv)
            echo "→ $csv"
            python enrich.py "$csv" -o "data/${base}.json"
          done

      - name: Detect notable changes
        id: changes
        run: |
          ALL=""
          for json in data/*.json; do
            [ -e "$json" ] || continue
            DIFF=$(python notify_changes.py "$json" || true)
            if [ -n "$DIFF" ]; then
              ALL="${ALL}${DIFF}"$'\n\n---\n\n'
            fi
          done
          if [ -n "$ALL" ]; then
            {
              echo "summary<<NOTIFY_EOF"
              echo "$ALL"
              echo "NOTIFY_EOF"
            } >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Aucun changement"
          else
            git commit -m "🎬 Mise à jour des sorties ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Open notification issue
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.changes.outputs.summary }}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎬 Sorties confirmées — ${today}`,
              body: summary,
              labels: ['release-update']
            });
